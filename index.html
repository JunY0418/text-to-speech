<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="読み上げノート"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>読み上げノート</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
  --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.18);
  --text: #f0f0f0; --text-muted: #888; --text-hint: #555;
  --accent: #e8ff6b; --accent-dark: #c8df3b; --accent-text: #0f0f0f;
  --danger: #ff6b6b; --danger-bg: rgba(255,107,107,0.1);
  --success: #6bffb8; --success-bg: rgba(107,255,184,0.1);
  --radius: 14px; --radius-sm: 8px;
  --font: 'Noto Sans JP', sans-serif; --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }
.app { display: flex; flex-direction: column; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
.header { padding: 56px 20px 16px; padding-top: max(56px, calc(44px + env(safe-area-inset-top))); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.header-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.header-info { flex: 1; }
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.header-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: var(--mono); }
.lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.lang-btn { padding: 6px 12px; font-size: 12px; font-weight: 700; font-family: var(--mono); background: none; border: none; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
.lang-btn.active { background: var(--accent); color: var(--accent-text); }
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
.tab { flex: 1; padding: 14px 0; font-size: 13px; font-weight: 500; color: var(--text-muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; font-family: var(--font); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.page { display: none; padding: 20px; flex-direction: column; gap: 16px; }
.page.active { display: flex; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; font-family: var(--mono); }
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.7; padding: 12px 14px; resize: none; outline: none; min-height: 130px; transition: border-color 0.2s; }
textarea:focus { border-color: var(--border-hover); }
textarea::placeholder { color: var(--text-hint); }
.input-row { display: flex; gap: 8px; margin-top: 10px; }
input[type=text] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 14px; padding: 10px 12px; outline: none; transition: border-color 0.2s; }
input[type=text]:focus { border-color: var(--border-hover); }
input[type=text]::placeholder { color: var(--text-hint); }
.lang-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-family: var(--mono); font-weight: 700; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); margin-left: 6px; vertical-align: middle; }
.lang-badge.en { color: var(--accent); border-color: rgba(232,255,107,0.3); background: rgba(232,255,107,0.07); }
.settings-row { display: flex; flex-direction: column; gap: 10px; padding: 12px 0 4px; }
.setting-item { display: flex; flex-direction: column; gap: 6px; }
.setting-label { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 13px; padding: 9px 12px; outline: none; width: 100%; appearance: none; cursor: pointer; }
.slider-row { display: flex; align-items: center; gap: 10px; }
input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer; }
.slider-val { font-size: 13px; font-weight: 500; color: var(--accent); font-family: var(--mono); min-width: 36px; text-align: right; }
.btn-group { display: flex; gap: 8px; margin-top: 4px; }
.btn { flex: 1; padding: 13px 0; border-radius: var(--radius-sm); font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; background: var(--surface2); color: var(--text); }
.btn:active { transform: scale(0.97); }
.btn-accent { background: var(--accent); color: var(--accent-text); border-color: transparent; font-weight: 700; }
.btn-accent:hover { background: var(--accent-dark); }
.btn-stop { border-color: var(--danger); color: var(--danger); }
.status { font-size: 12px; font-family: var(--mono); padding: 8px 12px; border-radius: var(--radius-sm); text-align: center; margin-top: 4px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.status.show { opacity: 1; }
.status.ok { background: var(--success-bg); color: var(--success); }
.status.err { background: var(--danger-bg); color: var(--danger); }
.list-header { display: flex; align-items: center; justify-content: space-between; }
.list-count { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; display: block; }
.saved-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; transition: border-color 0.2s; }
.saved-item:hover { border-color: var(--border-hover); }
.saved-item.playing { border-color: var(--accent); }
.saved-item-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.saved-item-preview { font-size: 12px; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
.saved-item-meta { font-size: 10px; font-family: var(--mono); color: var(--text-hint); margin-bottom: 10px; }
.item-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.icon-btn { padding: 7px 12px; border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font); font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); transition: all 0.15s; }
.icon-btn:hover { color: var(--text); border-color: var(--border-hover); }
.icon-btn:active { transform: scale(0.96); }
.icon-btn.play { color: var(--accent); border-color: var(--accent); background: rgba(232,255,107,0.07); }
.icon-btn.del { color: var(--danger); border-color: rgba(255,107,107,0.3); }
.icon-btn.del:hover { background: var(--danger-bg); }
.playing-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-right: 6px; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
/* Textarea wrapper */
.textarea-wrap { position: relative; }
.clear-btn { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.15s; }
.clear-btn:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; justify-content: center; padding-bottom: env(safe-area-inset-bottom); }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px; width: 100%; max-width: 460px; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 15px; padding: 12px 14px; outline: none; margin-bottom: 12px; }
.modal input:focus { border-color: var(--border-hover); }
.modal-btns { display: flex; gap: 8px; }
.modal-btns .btn { margin-top: 0; }
.about-card { text-align: center; padding: 24px 16px; }
.about-icon { font-size: 48px; margin-bottom: 12px; display: block; }
.about-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.about-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 4px; }
.install-steps { text-align: left; }
.step { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.step:last-child { border-bottom: none; }
.step-num { width: 24px; height: 24px; background: var(--accent); color: var(--accent-text); border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-text { font-size: 13px; line-height: 1.6; color: var(--text-muted); }
.step-text strong { color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">🔊</div>
    <div class="header-info">
      <h1 id="h-title">読み上げノート</h1>
      <div class="header-sub">TEXT TO SPEECH · PWA</div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ja')">JA</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('compose')" id="tab-compose">✏️ 作成</button>
    <button class="tab" onclick="switchTab('saved')" id="tab-saved">📚 ライブラリ</button>
    <button class="tab" onclick="switchTab('about')" id="tab-about">ℹ️ 使い方</button>
  </div>

  <div class="page active" id="page-compose">
    <div class="card">
      <div class="card-label" id="lbl-input">テキスト入力</div>
      <div class="textarea-wrap">
        <textarea id="inputText" placeholder="ここにテキストを入力してください…"></textarea>
        <button class="clear-btn" onclick="clearText()" title="クリア">✕</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label" id="lbl-voice">音声設定</div>
      <div class="settings-row">
        <div class="setting-item">
          <span class="setting-label">VOICE</span>
          <select id="voiceSelect"><option>読み込み中…</option></select>
        </div>
        <div class="setting-item">
          <span class="setting-label">SPEED</span>
          <div class="slider-row">
            <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1"/>
            <span class="slider-val" id="speedVal">1.0x</span>
          </div>
        </div>
        <div class="setting-item">
          <span class="setting-label">PITCH</span>
          <div class="slider-row">
            <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1"/>
            <span class="slider-val" id="pitchVal">1.0</span>
          </div>
        </div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-accent" onclick="playText()" id="btn-play">▶ 再生</button>
      <button class="btn btn-stop" onclick="stopText()" id="btn-stop">■ 停止</button>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="saveEntry()" id="btn-save">＋ 保存する</button>
      <button class="btn" onclick="shareText()" id="btn-share">↗ 共有</button>
    </div>
    <div id="statusBar" class="status"></div>
  </div>

  <div class="page" id="page-saved">
    <div class="list-header">
      <span style="font-size:15px;font-weight:700;" id="lbl-saved-title">ライブラリ</span>
      <span class="list-count" id="listCount">0 件</span>
    </div>
    <div id="savedList"></div>
  </div>

  <!-- Save name modal -->
  <div class="modal-overlay" id="saveModal" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-title" id="modal-title">保存名を入力</div>
      <div class="modal-sub" id="modal-sub">空欄のままでも自動で名前がつきます</div>
      <input type="text" id="modalName" placeholder="例：朝のあいさつ" maxlength="50"/>
      <div class="modal-btns">
        <button class="btn" onclick="closeModalCancel()" id="modal-cancel">キャンセル</button>
        <button class="btn btn-accent" onclick="confirmSave()" id="modal-confirm">保存する</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-about">
    <div class="card about-card">
      <span class="about-icon">🔊</span>
      <div class="about-title" id="about-app-title">読み上げノート</div>
      <div class="about-desc" id="about-desc">テキストを音声で読み上げ・保存・共有できるPWAアプリです。インターネット不要でオフラインでも動作します。</div>
    </div>
    <div class="card">
      <div class="card-label" id="lbl-install">ホーム画面への追加方法</div>
      <div class="install-steps" id="install-steps"></div>
    </div>
    <div class="card">
      <div class="card-label" id="lbl-features">機能一覧</div>
      <div class="install-steps" id="features-list"></div>
    </div>
  </div>
</div>

<script>
const T = {
  ja: {
    appTitle:'読み上げノート', tabCompose:'✏️ 作成', tabSaved:'📚 ライブラリ', tabAbout:'ℹ️ 使い方',
    lblInput:'テキスト入力', lblVoice:'音声設定', btnPlay:'▶ 再生', btnStop:'■ 停止',
    btnSave:'＋ 保存する', btnShare:'↗ 共有', lblSavedTitle:'ライブラリ',
    placeholder:'ここにテキストを入力してください…', saveNamePH:'保存名（例：朝のあいさつ）',
    loadingVoice:'読み込み中…', statusPlaying:'再生中…', statusDone:'再生完了',
    statusNoText:'テキストを入力してください', statusSaved:'」を保存しました',
    statusCopied:'クリップボードにコピーしました', statusCopyFail:'コピーに失敗しました',
    autoName:'保存 ', btnPlayItem:'▶ 再生', btnStopItem:'■ 停止',
    btnEdit:'✏️ 編集', btnShareItem:'↗ 共有', btnDelete:'削除',
    emptyMsg:'まだ保存されていません。<br>「作成」タブでテキストを保存してください。',
    countSuffix:' 件', aboutAppTitle:'読み上げノート',
    aboutDesc:'テキストを音声で読み上げ・保存・共有できるPWAアプリです。インターネット不要でオフラインでも動作します。',
    lblInstall:'ホーム画面への追加方法',
    installSteps:[
      {n:'1', bold:'iPhoneの場合', text:'：Safariで開いて、下の「共有」ボタン →「ホーム画面に追加」をタップ'},
      {n:'2', bold:'Androidの場合', text:'：Chromeで開いて、メニュー（⋮）→「ホーム画面に追加」をタップ'},
      {n:'3', bold:'', text:'ホーム画面にアイコンが追加されると、アプリと同じ感覚で起動できます'}
    ],
    lblFeatures:'機能一覧',
    features:['日本語・英語テキストを音声で読み上げ','言語切り替え（JA / EN）対応','速度・ピッチ調整対応','名前をつけて何件でも保存・何度でも再生','保存データはスマホ内に保持（オフライン動作）','テキスト共有（LINEやメールへの送信）'],
    modalTitle:'保存名を入力', modalSub:'空欄のままでも自動で名前がつきます',
    modalNamePH:'例：朝のあいさつ', modalCancel:'キャンセル', modalConfirm:'保存する',
    langCode:'ja-JP', locale:'ja-JP'
  },
  en: {
    appTitle:'Speech Notes', tabCompose:'✏️ Compose', tabSaved:'📚 Library', tabAbout:'ℹ️ Guide',
    lblInput:'Text Input', lblVoice:'Voice Settings', btnPlay:'▶ Play', btnStop:'■ Stop',
    btnSave:'＋ Save', btnShare:'↗ Share', lblSavedTitle:'Library',
    placeholder:'Type your text here…', saveNamePH:'Name (e.g. Morning greeting)',
    loadingVoice:'Loading…', statusPlaying:'Playing…', statusDone:'Done',
    statusNoText:'Please enter some text', statusSaved:'" saved',
    statusCopied:'Copied to clipboard', statusCopyFail:'Copy failed',
    autoName:'Note ', btnPlayItem:'▶ Play', btnStopItem:'■ Stop',
    btnEdit:'✏️ Edit', btnShareItem:'↗ Share', btnDelete:'Delete',
    emptyMsg:'No saved items yet.<br>Go to Compose tab to save text.',
    countSuffix:' items', aboutAppTitle:'Speech Notes',
    aboutDesc:'A PWA that reads text aloud, saves notes, and shares them. Works offline — no internet required.',
    lblInstall:'How to add to home screen',
    installSteps:[
      {n:'1', bold:'iPhone', text:': Open in Safari → tap Share → "Add to Home Screen"'},
      {n:'2', bold:'Android', text:': Open in Chrome → menu (⋮) → "Add to Home Screen"'},
      {n:'3', bold:'', text:'Once added, it launches fullscreen just like a native app'}
    ],
    lblFeatures:'Features',
    features:['Text-to-speech in Japanese & English','Language toggle (JA / EN)','Speed & pitch control','Save unlimited notes, replay anytime','Data stored on device (offline)','Share text via any app'],
    modalTitle:'Enter a name', modalSub:'Leave blank for auto name',
    modalNamePH:'e.g. Morning greeting', modalCancel:'Cancel', modalConfirm:'Save',
    langCode:'en-US', locale:'en-US'
  }
};

let lang = localStorage.getItem('yomage_lang') || 'ja';
let voices = [], currentUtter = null, playingId = null;
const tx = () => T[lang];

function setLang(l) {
  lang = l;
  localStorage.setItem('yomage_lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.documentElement.lang = l;
  applyUI();
  loadVoices();
}

function applyUI() {
  const t = tx();
  document.getElementById('h-title').textContent = t.appTitle;
  document.getElementById('tab-compose').textContent = t.tabCompose;
  document.getElementById('tab-saved').textContent = t.tabSaved;
  document.getElementById('tab-about').textContent = t.tabAbout;
  document.getElementById('lbl-input').textContent = t.lblInput;
  document.getElementById('lbl-voice').textContent = t.lblVoice;
  document.getElementById('btn-play').textContent = t.btnPlay;
  document.getElementById('btn-stop').textContent = t.btnStop;
  document.getElementById('btn-save').textContent = t.btnSave;
  document.getElementById('btn-share').textContent = t.btnShare;
  document.getElementById('lbl-saved-title').textContent = t.lblSavedTitle;
  document.getElementById('inputText').placeholder = t.placeholder;
  document.getElementById('modal-title').textContent = t.modalTitle;
  document.getElementById('modal-sub').textContent = t.modalSub;
  document.getElementById('modalName').placeholder = t.modalNamePH;
  document.getElementById('modal-cancel').textContent = t.modalCancel;
  document.getElementById('modal-confirm').textContent = t.modalConfirm;
  document.getElementById('about-app-title').textContent = t.aboutAppTitle;
  document.getElementById('about-desc').textContent = t.aboutDesc;
  document.getElementById('lbl-install').textContent = t.lblInstall;
  document.getElementById('lbl-features').textContent = t.lblFeatures;
  document.getElementById('install-steps').innerHTML = t.installSteps.map(s =>
    `<div class="step"><div class="step-num">${s.n}</div><div class="step-text">${s.bold ? `<strong>${s.bold}</strong>${s.text}` : s.text}</div></div>`
  ).join('');
  document.getElementById('features-list').innerHTML = t.features.map(f =>
    `<div class="step"><div class="step-num">✓</div><div class="step-text">${f}</div></div>`
  ).join('');
  renderList();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['compose','saved','about'][i] === name));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'saved') renderList();
}

// Natural voice priority order for Japanese
const JA_PREFERRED = ['Kyoko', 'O-Ren', 'Otoya', 'Hattori', 'Google 日本語', 'Microsoft Haruka', 'Microsoft Ichiro'];

function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  const sel = document.getElementById('voiceSelect');
  if (!voices.length) { sel.innerHTML = `<option>${tx().loadingVoice}</option>`; return; }
  const ja = voices.filter(v => v.lang.startsWith('ja'));
  // Sort Japanese voices: preferred natural ones first
  ja.sort((a, b) => {
    const ai = JA_PREFERRED.findIndex(n => a.name.includes(n));
    const bi = JA_PREFERRED.findIndex(n => b.name.includes(n));
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
  const en = voices.filter(v => v.lang.startsWith('en'));
  const others = voices.filter(v => !v.lang.startsWith('ja') && !v.lang.startsWith('en'));
  let html = '';
  if (ja.length) html += `<optgroup label="日本語">${ja.map(v=>`<option value="${voices.indexOf(v)}">${v.name}</option>`).join('')}</optgroup>`;
  if (en.length) html += `<optgroup label="English">${en.map(v=>`<option value="${voices.indexOf(v)}">${v.name} (${v.lang})</option>`).join('')}</optgroup>`;
  if (others.length) html += `<optgroup label="Other">${others.map(v=>`<option value="${voices.indexOf(v)}">${v.name} (${v.lang})</option>`).join('')}</optgroup>`;
  sel.innerHTML = html;
  // Auto-select first Japanese preferred voice
  if (ja.length) {
    const bestIdx = voices.indexOf(ja[0]);
    sel.value = bestIdx;
  }
}
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

document.getElementById('speedRange').oninput = function() {
  document.getElementById('speedVal').textContent = parseFloat(this.value).toFixed(1) + 'x';
};
document.getElementById('pitchRange').oninput = function() {
  document.getElementById('pitchVal').textContent = parseFloat(this.value).toFixed(1);
};

function speak(text, langCode, onEnd) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const idx = parseInt(document.getElementById('voiceSelect').value);
  if (voices[idx]) u.voice = voices[idx];
  u.rate = parseFloat(document.getElementById('speedRange').value);
  u.pitch = parseFloat(document.getElementById('pitchRange').value);
  u.lang = langCode;
  u.onend = u.onerror = () => { currentUtter = null; if (onEnd) onEnd(); };
  currentUtter = u;
  window.speechSynthesis.speak(u);
}

function getVoiceLang() {
  const idx = parseInt(document.getElementById('voiceSelect').value);
  return (voices[idx] && voices[idx].lang) || tx().langCode;
}

function playText() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showStatus(tx().statusNoText, 'err'); return; }
  speak(text, getVoiceLang(), () => showStatus(tx().statusDone, 'ok'));
  showStatus(tx().statusPlaying, 'ok');
}

function stopText() {
  window.speechSynthesis.cancel();
  currentUtter = null;
  if (playingId !== null) setPlayingId(null);
}

let stTimer;
function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status show ' + type;
  clearTimeout(stTimer);
  stTimer = setTimeout(() => bar.classList.remove('show'), 2500);
}

function getEntries() { try { return JSON.parse(localStorage.getItem('yomage_v1') || '[]'); } catch { return []; } }
function setEntries(arr) { localStorage.setItem('yomage_v1', JSON.stringify(arr)); }

function clearText() {
  document.getElementById('inputText').value = '';
  document.getElementById('inputText').focus();
}

function saveEntry() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showStatus(tx().statusNoText, 'err'); return; }
  // Open modal
  document.getElementById('modalName').value = '';
  document.getElementById('saveModal').classList.add('show');
  setTimeout(() => document.getElementById('modalName').focus(), 100);
}

function closeModal(e) {
  if (e.target === document.getElementById('saveModal')) closeModalCancel();
}
function closeModalCancel() {
  document.getElementById('saveModal').classList.remove('show');
}

function confirmSave() {
  const text = document.getElementById('inputText').value.trim();
  const now = new Date();
  const auto = tx().autoName + now.toLocaleString(tx().locale, {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const name = document.getElementById('modalName').value.trim() || auto;
  document.getElementById('saveModal').classList.remove('show');
  const arr = getEntries();
  arr.unshift({ id: Date.now(), name, text, lang, createdAt: now.toISOString() });
  setEntries(arr);
  showStatus('「' + name + tx().statusSaved, 'ok');
  renderList();
}

// Enter key confirms modal
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('saveModal').classList.contains('show')) confirmSave();
  if (e.key === 'Escape' && document.getElementById('saveModal').classList.contains('show')) closeModalCancel();
});

function shareText() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showStatus(tx().statusNoText, 'err'); return; }
  if (navigator.share) { navigator.share({ title: tx().appTitle, text }).catch(() => copyClip(text)); }
  else { copyClip(text); }
}

function copyClip(text) {
  navigator.clipboard.writeText(text)
    .then(() => showStatus(tx().statusCopied, 'ok'))
    .catch(() => showStatus(tx().statusCopyFail, 'err'));
}

function setPlayingId(id) {
  playingId = id;
  document.querySelectorAll('.saved-item').forEach(el => {
    const eid = parseInt(el.dataset.id);
    const el_lang = el.dataset.lang || 'ja';
    el.classList.toggle('playing', eid === id);
    const btn = el.querySelector('.play-btn');
    if (btn) {
      btn.textContent = eid === id ? T[el_lang].btnStopItem : T[el_lang].btnPlayItem;
      btn.classList.toggle('play', eid !== id);
    }
  });
}

function togglePlayItem(id, text, el_lang) {
  if (playingId === id) { window.speechSynthesis.cancel(); setPlayingId(null); return; }
  setPlayingId(id);
  const lc = (T[el_lang] || T.ja).langCode;
  speak(text, lc, () => { if (playingId === id) setPlayingId(null); renderList(); });
}

function loadToEditor(name, text) {
  document.getElementById('inputText').value = text;
  document.getElementById('saveName').value = name;
  switchTab('compose');
}

function deleteEntry(id) {
  if (playingId === id) { window.speechSynthesis.cancel(); playingId = null; }
  setEntries(getEntries().filter(e => e.id !== id));
  renderList();
}

function shareEntry(name, text) {
  if (navigator.share) { navigator.share({ title: name, text: name + '\n\n' + text }).catch(() => copyClip(text)); }
  else { copyClip(name + '\n\n' + text); }
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getEntryById(id) { return getEntries().find(e => e.id === id); }

function renderList() {
  const arr = getEntries();
  const cnt = document.getElementById('listCount');
  const container = document.getElementById('savedList');
  cnt.textContent = arr.length + tx().countSuffix;
  if (!arr.length) {
    container.innerHTML = `<div class="empty-state"><span class="emoji">📝</span>${tx().emptyMsg}</div>`;
    return;
  }
  container.innerHTML = arr.map(e => {
    const el = e.lang || 'ja';
    const etx = T[el] || T.ja;
    const isPlaying = playingId === e.id;
    const date = new Date(e.createdAt).toLocaleString(etx.locale, {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `<div class="saved-item${isPlaying?' playing':''}" data-id="${e.id}" data-lang="${el}">
      <div class="saved-item-name">${isPlaying?'<span class="playing-dot"></span>':''}${esc(e.name)}<span class="lang-badge${el==='en'?' en':''}">${el.toUpperCase()}</span></div>
      <div class="saved-item-preview">${esc(e.text)}</div>
      <div class="saved-item-meta">${date}</div>
      <div class="item-actions">
        <button class="icon-btn play-btn${isPlaying?'':' play'}" onclick="handlePlay(${e.id})">${isPlaying?etx.btnStopItem:etx.btnPlayItem}</button>
        <button class="icon-btn" onclick="handleEdit(${e.id})">${tx().btnEdit}</button>
        <button class="icon-btn" onclick="handleShare(${e.id})">${tx().btnShareItem}</button>
        <button class="icon-btn del" onclick="deleteEntry(${e.id})">${tx().btnDelete}</button>
      </div>
    </div>`;
  }).join('');
}

function handlePlay(id) {
  const e = getEntryById(id); if (!e) return;
  togglePlayItem(id, e.text, e.lang || 'ja');
}
function handleEdit(id) {
  const e = getEntryById(id); if (!e) return;
  loadToEditor(e.name, e.text);
}
function handleShare(id) {
  const e = getEntryById(id); if (!e) return;
  shareEntry(e.name, e.text);
}

// Init
document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
applyUI();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
